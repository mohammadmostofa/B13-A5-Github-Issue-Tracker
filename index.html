<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> GitHub_issue_traker_(sign_in) </title>
  <link rel="shortcut icon" href="assets/images/github-logo.png" type="image/x-icon">
  <!-- css link -->
  <link rel="stylesheet" href="assets/style.css">
  <!-- daisy and tailwind cdn link -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- google font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

  <!-- fontawesome link -->
   <script src="https://kit.fontawesome.com/a9d83994ad.js" crossorigin="anonymous"></script>


<style>

*{

  .geist-font {
  font-family: "Geist", sans-serif;
  
}

}

</style>

</head>

<body>


  <!-- sign section -->

  <header>
    <!-- login -->
     <section class="mx-auto ">

    <div class=" flex justify-center items-center mt-15  md:mt-6">
          
      <div  class=" bg-[rgb(255,255,255)]  flex flex-col  py-10  px-6 md:py-9 justify-center items-center
       rounded-md shadow-2xl shadow-gray-400">

        <div class="  flex flex-col justify-center items-center  ">


          <div class="grid grid-cols-1 justify-center items-center text-center">
             <div><img src="assets/images/github-logo.png" class="mx-auto" alt=""></div>
            <h2 class="font-bold text-[#1F2937] drop-shadow-md text-2xl mt-4">GitHub Issues Tracker</h2>
          <p class="text-[#64748B] my-2">Sign in to manage your issues</p>
          </div>

        </div>

          <div class="flex flex-col justify-center mt-3 ">
            <label class="py-1 text-black font-semibold" for="name">Username</label>
          <input class=" w-80  border-gray-300 outline-none rounded-sm p-2 " type="text" id="name" value=""
            placeholder="Enter your Username">
            <p class="text-[10px]">admin</p>
             <br>
          <label class="py-1 text-black font-semibold" for="password">password</label>
          <input  class="w-80  border-gray-300 outline-none rounded-sm p-2 " type="password" id="password" value="" placeholder="Enter password">
          <p class="text-[10px]">admin123</p>
          <br>

          <button id ="login-btn"  type="submit"  class="btn btn-primary w-full bg-[#4A00FF]">Login</button>

          </div>


      </div>
      

    </div>



  </section>

  </header>

 


  <!-- script connnected -->
  <script src="script/index.js"></script>
</body>

</html>
