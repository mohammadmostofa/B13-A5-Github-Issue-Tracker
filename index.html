<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sing In </title>
  <!-- css link -->
  <link rel="stylesheet" href="assets/style.css">
  <!-- daisy and tailwind cdn link -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- google font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

  <!-- fontawesome link -->
   <script src="https://kit.fontawesome.com/a9d83994ad.js" crossorigin="anonymous"></script>


<style>

*{

  .geist-font {
  font-family: "Geist", sans-serif;
  
}

}

</style>

</head>

<body>


  <!-- sign section -->

  <section class="bg-[#F8FAFC] mx-auto ">



    <div class="w-11/12 flex flex-col justify-center items-center ">


      <div class="bg-white flex flex-col justify-center items-center space-y-4 py-16 md:py-20 px-6 my-15 rounded-md shadow-md">


        <div class=" flex flex-col justify-center items-center space-y-6 ">

          <div><img src="assets/images/github-logo.png" class="mx-auto" alt=""></div>

          <div class="flex flex-col justify-center items-center">
            <h2 class="font-bold text-[#1F2937] drop-shadow-md text-2xl">GitHub Issues Tracker</h2>
          <p class="text-[#64748B]">Sign in to manage your issues</p>
          </div>

        </div>

      

          <div>

  

            <label for="name">Username</label><br>
          <input class=" w-80 md:w-120 border-gray-300 outline-none rounded-sm p-2 my-2" type="text" id="name" value=""
            placeholder="Enter your Username">
            <p>admin</p>
             <br>
          <label for="password">password</label><br>
          <input  class="w-80 md:w-120 border-gray-300 outline-none rounded-sm p-2 my-2" type="password" id="password" value="" placeholder="Enter password">
          <p>admin123</p>
          <br>

          <button id="login-btn"  type="submit"  class="btn btn-primary w-full my-2 bg-[#4A00FF]">Sign in</button>

          </div>

      


      </div>

    </div>




  </section>



  <!-- script connnected -->
  <script src="assets/script/sign_in.js"></script>
</body>

</html>
