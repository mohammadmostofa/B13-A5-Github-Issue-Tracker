<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sing In </title>
  <!-- css link -->
  <link rel="stylesheet" href="assets/style.css">
  <!-- daisy and tailwind cdn link -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- google font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

  <!-- fontawesome link -->
   <script src="https://kit.fontawesome.com/a9d83994ad.js" crossorigin="anonymous"></script>


<style>

*{

  .geist-font {
  font-family: "Geist", sans-serif;
  
}

}

</style>

</head>

<body>

  <main>
    <section>

  <!-- header section -->

  <section class="mx-auto">

    <div class="flex flex-col justify-center items-center">

      <div class=" w-11/12 grid grid-cols-1  justify-center items-center md:flex md:justify-between md:px-10 shadow-sm py-4">

      <!-- left -->
      <div class=" flex justify-center py-3  md:flex items-center   space-x-4 ">
             <i class="fa-brands fa-github text-2xl text-center text-black font-bold"></i>
             <span class="text-black font-bold text-xl">GitHub Issues Tracker</span>
      </div>

      <!-- right -->

      <div class=" flex justify-center items-center space-x-3  ">
    <div class="border border-gray-200 p-2 rounded-sm flex justify-center ">
      <span><i class="fa-solid fa-magnifying-glass"></i></span>
      <input class="outline-none border-none" type="search" id="section" placeholder="  Search issues...">
    </div>

          <div><button class="btn btn-primary bg-[#4A00FF] hover:bg-[#270080]  text-white py-4 px-3">+New Issue</button></div>

  </div>

    </div>

    </div>

  </section>


  <!-- action btn section -->
   <section class="mx-auto">
    
<div class="flex justify-center">

      <div class="flex max-w-[1100px] w-full  bg-[#efefef] justify-start py-10 px-5 space-x-4 mt-10  rounded-sm ">

         <button id="AllBtn" class=" filter-btn bg-blue-500  btn btn-primary px-9 py-4 border-none font-semibold">All</button>
         <button id="open-btn" class="filter-btn  btn btn-primary px-9 py-4 bg- bg-green-400 hover:border-none font-semibold text-white border-yellow-200">Open</button>
         <button id="close-btn" class="filter-btn btn btn-primary px-9 py-4 bg- bg-violet-400 hover:border-none font-semibold  text-white border-yellow-200">Close</button>
       

    </div>

</div>

   </section>

   <!-- counting section -->
   <section class="mx-auto">
    
<div class="flex justify-center">

      <div class="flex max-w-[1100px] w-full  bg-[#f7f7f7] justify-between items-center py-10 px-4 space-x-4 mt-5 rounded-sm ">
         
        <!-- left -->
         <div class="flex justify-center items-center space-x-5">

          <div><img src="assets/images/Aperture.png" class="mx-auto" alt=""></div>

         <div>
           <h2  id="All-card-display"  class="  text-2xl font-bold">0 Issues</h2>
           <p>Track and manage your project issues</p>
         </div>
        

         </div>

         <!-- right -->
          <div class="flex justify-center items-center text-center space-x-4">
            <div><i class="fa-regular fa-circle bg-green-700 rounded-full text-green-700"></i><span class="text-sm font-semibold text-black px-2 text-center">open</span></div>
            <div><i class="fa-regular fa-circle bg-[#A855F7] rounded-full text-[#A855F7]"></i><span class="text-sm font-semibold text-black px-2 text-center">close</span></div>
          </div>
                

    </div>

</div>

   </section>
  

   <!-- All cards section -->
    <section class="mx-auto">
    
    <div class="flex justify-center items-center">

      <div id = 'card-container' class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-3 my-20 w-[1100px] gap-4">
    </div>

    </div>


   </section>

    </section>





<!-- open card section -->
        <section class="mx-auto">
    
    <div class="flex justify-center items-center">

      <div id = 'open-card-container' class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-3 my-20 w-[1100px] gap-4">
    </div>

    </div>


   </section>

    </section>

  </main>



  <!-- script connnected -->
  <script src="script/home.js"></script>
  <script src="script/button.js"></script>
</body>

</html>
